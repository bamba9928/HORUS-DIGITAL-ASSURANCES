name: Deploy

# Déploie sur le VPS quand le CI passe sur main.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Déploiement VPS
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    steps:
      - name: Préparer la clé SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 51.178.55.113 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Déployer
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes mada@51.178.55.113 'bash ~/deploy_horus.sh'
